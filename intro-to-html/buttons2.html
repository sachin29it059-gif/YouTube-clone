<!DOCTYPE html>
<>
    <head>
      <title>Buttons Practice</title>
    </head>
    <body>

    <style>
        
    
    .subscribe-button {
        height: 36px;
        width:  105px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15;
        margin-left: 2px;
        padding-top: 10px;
        padding-bottom: 10px;
        

 
  }
  .subscribe-button:hover {
        opacity: 0.8;
  }
  .suscribe-button:active{
        opacity: 0.5;
  }


  .join-button{
    background-color: white;
    border-color: rgb(42, 42, 203);
    border-style: solid;
    border-width: 1px;
    color: rgb(41, 41, 172);
    height: 36px;
    width: 62px;
    border-radius: 2px;
    cursor: pointer;
    transition: opacity o.15s;
    color: 0.21s;
    margin-left: 8px;
    padding-top: 10px;
    padding-bottom: 10px;




  }
  .join-button:hover {
     background-color: rgb(41, 41, 172);
     color: rgb(42, 42, 203);

  }
  join-button:active{
    opacity: 0.8;

  }
  .tweet-button{
    background-color: rgb(41, 41, 216);
    color: white;
    height: 36px;
    width: 70px;
    border-radius: 18px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    margin-left: 8px;
    transition: box-shadow 0.15s;
    box-shadow: 5px 5px 5px rgba(0, 0, 0.15);
    padding-top: 10px;
    padding-bottom: 10px;
    vertical-align: top;

  }
  .tweet-button:hover {
    box-shadow: 5px 5px 5px rgba(0, 0, 0.15);
  }
  .tweet-button:active {
    opacity: 0.6;
  }



</style>
    </head>
    <body>
        <button class="subscribe-button">
    SUBSCRIBE
</button>



<button class="join-button">
    JOIN
</button>

<button class="tweet-button">
    Tweet
</button>
    </body>
</html>
