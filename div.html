<!DOCTYPE html>
<html>
   <head>
      <title>YouTube.com</title>
      <style>
          .thumbnail {
            width: 300px;
            height: 300px;
            object-fit: cover;
            object-position: right;
            object-fit: contain;
            border-width: 2px;
            border-style: solid;
            border-color: red;
            display: block;
          }
          .search-bar{
             font-size: 20px;
             margin-left: 12px;
             display: inline-block;

          }
          .video-title {
            font-weight: bold;
            width: 300px;
          }
          .video-author {
             display: inline-block;
          }
          .video-stats {
             display: inline-block;
          }
          .div-example {
             display: inline-block;
          }
          .video-preview {
            width: 300px;
            display: inline-block;
            vertical-align: top;
            margin-right: 50px; 
          }

      </style>
   </head>
   <body>
      <input class="search-bar" type="text" placeholder="Search">
      
      
    <div class="video-preview">
        <img class="thumbnail" src="thumbnails/thumbnail-1.webp">

    
    <p class="video-title">
       Talking Tech <strong>and AI with</strong> Google CEO Sundar
       Pichai!
    </p>
    <p class="viedo-author">
      Marques Brownlee
    </p>
    <p class="video-stats">
      3.4M views • 1 year ago
    </p>
      
    </div>
    <div class="video-preview">
        <img class="thumbnail" src="thumbnails/thumbnail-2 .webp">

    
    <p class="video-title">
       
     
      Try Not To Laugh Challenge #9

    </p>
    <p class="viedo-author">
      Markipler
    </p>
    <p class="video-stats">
     19M views · 4 years ago
    </p>
      
    </div>
   </body> 
</html>
